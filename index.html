<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Lab 🔬 — MoneyMoves</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e11;
    --bg2: #131722;
    --surface: #1a1f2e;
    --surface2: #1e2535;
    --surface3: #252d3d;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --text: #d1d4dc;
    --text-bright: #f0f3fa;
    --muted: #787b86;
    --green: #26a69a;
    --green-bright: #00e5c3;
    --red: #ef5350;
    --lime: #c9f135;
    --blue: #2962ff;
    --blue-light: #5c8df6;
    --purple: #9b5de5;
    --orange: #ff6b35;
    --yellow: #ffd60a;
    --pink: #f72585;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); overflow-x: hidden; font-size: 14px; line-height: 1.5; }
 
  /* ── TOP BAR ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    height: 48px; background: var(--bg2);
    border-bottom: 1px solid var(--border2);
    display: flex; align-items: center; padding: 0 16px; gap: 0;
  }
  .topbar-logo {
    font-family: var(--font-display); font-weight: 800; font-size: 1rem;
    background: linear-gradient(135deg, var(--lime), var(--green-bright));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none; margin-right: 16px; white-space: nowrap;
  }
  .topbar-divider { width: 1px; height: 24px; background: var(--border2); margin: 0 12px; }
  .topbar-tabs { display: flex; gap: 2px; flex: 1; overflow-x: auto; }
  .topbar-tabs::-webkit-scrollbar { display: none; }
  .tb-tab {
    display: flex; align-items: center; gap: 7px;
    padding: 0 14px; height: 48px; font-size: 0.78rem; font-weight: 500;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    white-space: nowrap; transition: all 0.15s; background: transparent; border-top: none; border-left: none; border-right: none;
    font-family: var(--font-body);
  }
  .tb-tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .tb-tab.active { color: var(--text-bright); border-bottom-color: var(--blue-light); }
  .tb-tab .dot { width: 6px; height: 6px; border-radius: 50%; }
  .topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--muted); font-size: 0.78rem; text-decoration: none;
    padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border2);
    transition: all 0.2s;
  }
  .back-btn:hover { color: var(--text-bright); border-color: rgba(255,255,255,0.2); }
  .live-indicator { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; font-weight: 700; color: var(--green); font-family: var(--font-mono); }
  .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.5)} }
 
  /* ── LAYOUT ── */
  .app-layout { display: flex; height: 100vh; padding-top: 48px; }
 
  /* ── LEFT SIDEBAR ── */
  .sidebar {
    width: 56px; background: var(--bg2); border-right: 1px solid var(--border2);
    display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 4px;
    flex-shrink: 0; z-index: 100;
  }
  .sidebar-btn {
    width: 36px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-size: 1rem; cursor: pointer; color: var(--muted); transition: all 0.15s;
    border: 1px solid transparent; background: transparent;
  }
  .sidebar-btn:hover, .sidebar-btn.active { background: var(--surface2); color: var(--text-bright); border-color: var(--border2); }
  .sidebar-sep { width: 32px; height: 1px; background: var(--border2); margin: 4px 0; }
 
  /* ── MAIN PANELS ── */
  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
 
  /* Symbol strip */
  .symbol-strip {
    height: 40px; background: var(--bg2); border-bottom: 1px solid var(--border2);
    display: flex; align-items: center; padding: 0 12px; gap: 6px; overflow-x: auto;
  }
  .symbol-strip::-webkit-scrollbar { display: none; }
  .sym-chip {
    display: flex; align-items: center; gap: 8px; padding: 5px 12px; border-radius: 4px;
    cursor: pointer; white-space: nowrap; transition: all 0.15s; border: 1px solid transparent;
    background: transparent; font-family: var(--font-body);
  }
  .sym-chip:hover { background: var(--surface2); }
  .sym-chip.active { background: var(--surface2); border-color: rgba(41,98,255,0.4); }
  .sym-chip-name { font-size: 0.78rem; font-weight: 700; color: var(--text-bright); font-family: var(--font-mono); }
  .sym-chip-price { font-size: 0.72rem; color: var(--muted); font-family: var(--font-mono); }
  .sym-chip-change { font-size: 0.68rem; font-weight: 600; font-family: var(--font-mono); }
  .up { color: var(--green); } .down { color: var(--red); }
  .sym-add { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--muted); cursor: pointer; font-size: 1.1rem; flex-shrink: 0; border: 1px dashed var(--border2); transition: all 0.2s; background: transparent; }
  .sym-add:hover { color: var(--text-bright); border-color: var(--border2); }
 
  /* Chart + right panel split */
  .chart-row { flex: 1; display: flex; overflow: hidden; }
 
  /* Chart area */
  .chart-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chart-toolbar {
    height: 36px; background: var(--bg2); border-bottom: 1px solid var(--border2);
    display: flex; align-items: center; padding: 0 10px; gap: 2px;
  }
  .ct-btn {
    padding: 3px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 600;
    cursor: pointer; color: var(--muted); transition: all 0.15s; white-space: nowrap;
    background: transparent; border: 1px solid transparent; font-family: var(--font-mono);
  }
  .ct-btn:hover { background: var(--surface2); color: var(--text); }
  .ct-btn.active { background: rgba(41,98,255,0.15); border-color: rgba(41,98,255,0.3); color: var(--blue-light); }
  .ct-sep { width: 1px; height: 18px; background: var(--border2); margin: 0 4px; }
  .ct-label { font-size: 0.68rem; color: var(--muted); margin-left: 4px; font-family: var(--font-mono); }
  .chart-wrap { flex: 1; background: var(--bg2); position: relative; overflow: hidden; }
  #tvChart { width: 100%; height: 100%; border: none; }
 
  /* Right panel */
  .right-panel {
    width: 260px; background: var(--bg2); border-left: 1px solid var(--border2);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .rp-tabs { display: flex; border-bottom: 1px solid var(--border2); }
  .rp-tab {
    flex: 1; padding: 10px 8px; font-size: 0.72rem; font-weight: 600;
    color: var(--muted); text-align: center; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.15s;
    background: transparent; border-top: none; border-left: none; border-right: none;
    font-family: var(--font-body);
  }
  .rp-tab:hover { color: var(--text); }
  .rp-tab.active { color: var(--text-bright); border-bottom-color: var(--blue-light); }
  .rp-body { flex: 1; overflow-y: auto; padding: 12px; }
  .rp-body::-webkit-scrollbar { width: 4px; }
  .rp-body::-webkit-scrollbar-track { background: transparent; }
  .rp-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
 
  /* Watchlist items */
  .wl-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 8px; border-radius: 6px; cursor: pointer; transition: background 0.15s;
    margin-bottom: 2px;
  }
  .wl-item:hover { background: var(--surface2); }
  .wl-item.active { background: var(--surface); border: 1px solid rgba(41,98,255,0.2); }
  .wl-sym { font-family: var(--font-mono); font-weight: 700; font-size: 0.8rem; color: var(--text-bright); }
  .wl-name { font-size: 0.65rem; color: var(--muted); margin-top: 1px; }
  .wl-right { text-align: right; }
  .wl-price { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-bright); }
  .wl-chg { font-family: var(--font-mono); font-size: 0.68rem; font-weight: 600; }
  .wl-bar { height: 2px; background: var(--surface3); border-radius: 1px; margin-top: 2px; overflow: hidden; }
  .wl-bar-fill { height: 100%; border-radius: 1px; }
 
  /* Indicator cards */
  .ind-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .ind-title { font-size: 0.7rem; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .ind-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .ind-label { font-size: 0.72rem; color: var(--muted); }
  .ind-val { font-family: var(--font-mono); font-size: 0.75rem; font-weight: 600; }
  .signal-badge { padding: 3px 10px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; font-family: var(--font-mono); }
  .signal-buy { background: rgba(38,166,154,0.15); color: var(--green); border: 1px solid rgba(38,166,154,0.3); }
  .signal-sell { background: rgba(239,83,80,0.15); color: var(--red); border: 1px solid rgba(239,83,80,0.3); }
  .signal-neutral { background: rgba(255,214,10,0.1); color: var(--yellow); border: 1px solid rgba(255,214,10,0.25); }
 
  /* ── BOTTOM SECTION (tabbed content) ── */
  .bottom-section {
    height: 340px; border-top: 1px solid var(--border2);
    background: var(--bg2); display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  .bs-tabs { display: flex; border-bottom: 1px solid var(--border2); padding: 0 12px; gap: 2px; }
  .bs-tab {
    padding: 8px 14px; font-size: 0.75rem; font-weight: 600; color: var(--muted);
    cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
    white-space: nowrap; background: transparent; border-top: none; border-left: none; border-right: none;
    font-family: var(--font-body);
  }
  .bs-tab:hover { color: var(--text); }
  .bs-tab.active { color: var(--text-bright); border-bottom-color: var(--lime); }
  .bs-body { flex: 1; overflow-y: auto; padding: 16px; }
  .bs-body::-webkit-scrollbar { width: 4px; }
  .bs-body::-webkit-scrollbar-thumb { background: var(--surface3); }
 
  /* Day trading grid */
  .dt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
  .dt-card {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 16px;
    transition: border-color 0.2s;
  }
  .dt-card:hover { border-color: rgba(255,255,255,0.15); }
  .dt-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .dt-card-title { font-size: 0.82rem; font-weight: 700; color: var(--text-bright); font-family: var(--font-display); }
  .dt-card-tag { padding: 2px 8px; border-radius: 4px; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.05em; font-family: var(--font-mono); }
  .dt-card p { font-size: 0.78rem; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
  .dt-stat-row { display: flex; gap: 12px; }
  .dt-stat { background: var(--surface2); border-radius: 5px; padding: 6px 10px; flex: 1; text-align: center; }
  .dt-stat-val { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 700; }
  .dt-stat-lbl { font-size: 0.6rem; color: var(--muted); margin-top: 1px; }
 
  /* Quiz styles */
  .lab-quiz { max-width: 700px; }
  .lq-question { font-size: 0.95rem; font-weight: 500; color: var(--text-bright); margin-bottom: 14px; line-height: 1.5; }
  .lq-opts { display: flex; flex-direction: column; gap: 7px; }
  .lq-opt {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 6px;
    padding: 10px 14px; cursor: pointer; font-size: 0.82rem; color: var(--muted);
    transition: all 0.15s; text-align: left; width: 100%; font-family: var(--font-body);
  }
  .lq-opt:hover { border-color: rgba(41,98,255,0.4); color: var(--text); background: rgba(41,98,255,0.05); }
  .lq-opt.correct { border-color: var(--green); background: rgba(38,166,154,0.1); color: var(--green); }
  .lq-opt.wrong { border-color: var(--red); background: rgba(239,83,80,0.1); color: var(--red); }
  .lq-feedback { margin-top: 10px; padding: 10px 14px; border-radius: 6px; font-size: 0.8rem; display: none; }
  .lq-feedback.show { display: block; }
  .lq-feedback.good { background: rgba(38,166,154,0.1); border: 1px solid rgba(38,166,154,0.25); color: #4ade80; }
  .lq-feedback.bad { background: rgba(239,83,80,0.1); border: 1px solid rgba(239,83,80,0.25); color: #f87171; }
  .lq-nav { display: flex; gap: 10px; margin-top: 12px; align-items: center; }
  .lq-next { background: var(--blue); color: white; border: none; padding: 8px 20px; border-radius: 5px; font-size: 0.78rem; font-weight: 700; cursor: pointer; font-family: var(--font-display); display: none; transition: opacity 0.2s; }
  .lq-next:hover { opacity: 0.88; }
  .lq-score { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); }
  .lq-progress { height: 2px; background: var(--surface3); border-radius: 1px; margin-bottom: 14px; overflow: hidden; }
  .lq-progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--green-bright)); transition: width 0.4s; }
 
  /* Glossary */
  .glossary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
  .gls-item { background: var(--surface); border: 1px solid var(--border2); border-radius: 7px; padding: 12px 14px; }
  .gls-term { font-family: var(--font-mono); font-size: 0.8rem; font-weight: 700; color: var(--lime); margin-bottom: 4px; }
  .gls-def { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }
 
  /* Screener table */
  .screener-table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
  .screener-table th { font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 6px 10px; text-align: right; border-bottom: 1px solid var(--border2); white-space: nowrap; }
  .screener-table th:first-child { text-align: left; }
  .screener-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); text-align: right; font-family: var(--font-mono); font-size: 0.74rem; }
  .screener-table td:first-child { text-align: left; }
  .screener-table tr:hover td { background: rgba(255,255,255,0.02); }
  .scr-sym { font-weight: 700; color: var(--text-bright); }
  .scr-name { font-size: 0.65rem; color: var(--muted); font-family: var(--font-body); }
  .scr-bar { display: inline-flex; align-items: center; gap: 6px; }
  .scr-minbar { width: 48px; height: 3px; background: var(--surface3); border-radius: 1px; overflow: hidden; display: inline-block; vertical-align: middle; }
  .scr-minbar-fill { height: 100%; border-radius: 1px; }
 
  @media (max-width: 900px) {
    .right-panel { display: none; }
    .sidebar { width: 44px; }
    .bottom-section { height: 280px; }
  }
  @media (max-width: 600px) {
    .sidebar { display: none; }
    .topbar-logo { font-size: 0.85rem; }
    .dt-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
 
<!-- TOP BAR -->
<div class="topbar">
  <a href="index.html" class="topbar-logo">MoneyMoves 💸</a>
  <div class="topbar-divider"></div>
  <div class="topbar-tabs">
    <button class="tb-tab active" onclick="setSection('chart')">
      <div class="dot" style="background:var(--blue-light)"></div> Chart
    </button>
    <button class="tb-tab" onclick="setSection('daytrading')">
      <div class="dot" style="background:var(--orange)"></div> Day Trading
    </button>
    <button class="tb-tab" onclick="setSection('quiz')">
      <div class="dot" style="background:var(--lime)"></div> Quiz
    </button>
    <button class="tb-tab" onclick="setSection('screener')">
      <div class="dot" style="background:var(--purple)"></div> Screener
    </button>
    <button class="tb-tab" onclick="setSection('glossary')">
      <div class="dot" style="background:var(--green-bright)"></div> Glossary
    </button>
  </div>
  <div class="topbar-right">
    <div class="live-indicator"><div class="live-dot"></div> LIVE 24/7</div>
    <a href="index.html" class="back-btn">← Back to MoneyMoves</a>
  </div>
</div>
 
<!-- LAYOUT -->
<div class="app-layout">
 
  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <button class="sidebar-btn active" title="Cursor">🖱️</button>
    <button class="sidebar-btn" title="Crosshair">✛</button>
    <div class="sidebar-sep"></div>
    <button class="sidebar-btn" title="Trend Line">📏</button>
    <button class="sidebar-btn" title="Fib Retracement">🌀</button>
    <button class="sidebar-btn" title="Rectangle">▭</button>
    <button class="sidebar-btn" title="Text">T</button>
    <div class="sidebar-sep"></div>
    <button class="sidebar-btn" title="Indicators">⚗️</button>
    <button class="sidebar-btn" title="Screenshot">📷</button>
  </div>
 
  <!-- MAIN AREA -->
  <div class="main-area">
 
    <!-- Symbol strip -->
    <div class="symbol-strip" id="symStrip">
      <div class="sym-chip active" data-sym="NASDAQ:AAPL" onclick="switchSym(this,'NASDAQ:AAPL','AAPL')">
        <span class="sym-chip-name">AAPL</span>
        <span class="sym-chip-price">—</span>
        <span class="sym-chip-change up">—</span>
      </div>
      <div class="sym-chip" data-sym="NASDAQ:MSFT" onclick="switchSym(this,'NASDAQ:MSFT','MSFT')">
        <span class="sym-chip-name">MSFT</span>
        <span class="sym-chip-price">—</span>
        <span class="sym-chip-change up">—</span>
      </div>
      <div class="sym-chip" data-sym="NASDAQ:NVDA" onclick="switchSym(this,'NASDAQ:NVDA','NVDA')">
        <span class="sym-chip-name">NVDA</span>
        <span class="sym-chip-price">—</span>
        <span class="sym-chip-change up">—</span>
      </div>
      <div class="sym-chip" data-sym="NASDAQ:TSLA" onclick="switchSym(this,'NASDAQ:TSLA','TSLA')">
        <span class="sym-chip-name">TSLA</span>
        <span class="sym-chip-price">—</span>
        <span class="sym-chip-change down">—</span>
      </div>
      <div class="sym-chip" data-sym="NASDAQ:GOOGL" onclick="switchSym(this,'NASDAQ:GOOGL','GOOGL')">
        <span class="sym-chip-name">GOOGL</span>
        <span class="sym-chip-price">—</span>
        <span class="sym-chip-change up">—</span>
      </div>
      <div class="sym-chip" data-sym="NASDAQ:AMZN" onclick="switchSym(this,'NASDAQ:AMZN','AMZN')">
        <span class="sym-chip-name">AMZN</span>
        <span class="sym-chip-price">—</span>
        <span class="sym-chip-change up">—</span>
      </div>
      <div class="sym-chip" data-sym="AMEX:SPY" onclick="switchSym(this,'AMEX:SPY','SPY')">
        <span class="sym-chip-name">SPY</span>
        <span class="sym-chip-price">—</span>
        <span class="sym-chip-change up">—</span>
      </div>
      <div class="sym-chip" data-sym="AMEX:QQQ" onclick="switchSym(this,'AMEX:QQQ','QQQ')">
        <span class="sym-chip-name">QQQ</span>
        <span class="sym-chip-price">—</span>
        <span class="sym-chip-change up">—</span>
      </div>
      <div class="sym-chip" data-sym="BINANCE:BTCUSDT" onclick="switchSym(this,'BINANCE:BTCUSDT','BTC')">
        <span class="sym-chip-name">BTC</span>
        <span class="sym-chip-price">—</span>
        <span class="sym-chip-change up">—</span>
      </div>
      <div class="sym-chip" data-sym="BINANCE:ETHUSDT" onclick="switchSym(this,'BINANCE:ETHUSDT','ETH')">
        <span class="sym-chip-name">ETH</span>
        <span class="sym-chip-price">—</span>
        <span class="sym-chip-change up">—</span>
      </div>
      <div class="sym-chip" data-sym="TVC:GOLD" onclick="switchSym(this,'TVC:GOLD','XAU/USD')">
        <span class="sym-chip-name">GOLD</span>
        <span class="sym-chip-price">—</span>
        <span class="sym-chip-change up">—</span>
      </div>
      <button class="sym-add">+</button>
    </div>
 
    <!-- Chart + Right panel row -->
    <div class="chart-row">
 
      <!-- Chart panel -->
      <div class="chart-panel">
        <!-- Chart toolbar -->
        <div class="chart-toolbar">
          <span class="ct-label">Interval:</span>
          <button class="ct-btn" onclick="setInterval('1')">1m</button>
          <button class="ct-btn" onclick="setInterval('5')">5m</button>
          <button class="ct-btn" onclick="setInterval('15')">15m</button>

}
 
function renderLqQuestion() {
  if (lqCurrent >= lqQuestions.length) { showLqResult(); return; }
  const q = lqQuestions[lqCurrent];
  const total = lqQuestions.length;
  const fillPct = (lqCurrent / total * 100);
  const fillEl = document.getElementById('lqFill');
  if (fillEl) fillEl.style.width = fillPct + '%';
  const qEl = document.getElementById('lqQ');
  if (qEl) qEl.innerHTML = `<strong style="color:var(--muted);font-size:0.72rem;font-family:var(--font-mono)">Q${lqCurrent+1}/${total}</strong><br>${q.q}`;
  const optsEl = document.getElementById('lqOpts');
  if (optsEl) optsEl.innerHTML = q.opts.map((o,i) => `<button class="lq-opt" onclick="lqAnswer(${i})">${o}</button>`).join('');
  const fb = document.getElementById('lqFb');
  if (fb) { fb.className = 'lq-feedback'; }
  const nextBtn = document.getElementById('lqNext');
  if (nextBtn) nextBtn.style.display = 'none';
  lqAnswered = false;
}
 
function lqAnswer(idx) {
  if (lqAnswered) return;
  lqAnswered = true;
  const q = lqQuestions[lqCurrent];
  document.querySelectorAll('.lq-opt').forEach((o,i) => {
    o.style.pointerEvents = 'none';
    if (i === q.ans) o.classList.add('correct');
    else if (i === idx && idx !== q.ans) o.classList.add('wrong');
  });
  const fb = document.getElementById('lqFb');
  if (idx === q.ans) {
    lqScore++;
    document.getElementById('lqScoreDisp').textContent = lqScore;
    fb.className = 'lq-feedback show good';
    fb.textContent = '✅ ' + q.exp;
  } else {
    fb.className = 'lq-feedback show bad';
    fb.textContent = '❌ ' + q.exp;
  }
  document.getElementById('lqNext').style.display = 'inline-block';
}
 
function lqNextQ() { lqCurrent++; renderLqQuestion(); }
 
function showLqResult() {
  const pct = lqScore / lqQuestions.length;
  let emoji = '🌱', title = 'Keep practicing!';
  if (pct >= 0.9) { emoji = '🏆'; title = 'Trading Expert!'; }
  else if (pct >= 0.7) { emoji = '🎯'; title = 'Solid Knowledge!'; }
  else if (pct >= 0.5) { emoji = '📚'; title = 'Getting There!'; }
  document.getElementById('labQuiz').innerHTML = `
    <div style="text-align:center;padding:24px 0">
      <div style="font-size:2.5rem;margin-bottom:12px">${emoji}</div>
      <div style="font-family:var(--font-display);font-size:1.2rem;font-weight:800;color:var(--text-bright);margin-bottom:8px">${title}</div>
      <div style="color:var(--muted);font-size:0.82rem;margin-bottom:18px">You scored ${lqScore}/${lqQuestions.length} — ${Math.round(pct*100)}%</div>
      <button onclick="startLabQuiz()" style="background:var(--blue);color:white;border:none;padding:9px 22px;border-radius:5px;font-family:var(--font-display);font-weight:700;font-size:0.82rem;cursor:pointer;">Try Again 🔄</button>
    </div>`;
}
 
// ── TOPBAR NAB (scroll to section via tab) ──
function setSection(sec) {
  document.querySelectorAll('.tb-tab').forEach(t => t.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if (sec === 'chart') { /* already visible */ }
  else if (sec === 'daytrading') { setBsTab('daytrading', document.querySelector('.bs-tab')); document.getElementById('bottomSection').scrollIntoView({behavior:'smooth'}); }
  else if (sec === 'quiz') { setBsTab('quiz', document.querySelectorAll('.bs-tab')[1]); document.getElementById('bottomSection').scrollIntoView({behavior:'smooth'}); }
  else if (sec === 'screener') { setBsTab('screener', document.querySelectorAll('.bs-tab')[2]); document.getElementById('bottomSection').scrollIntoView({behavior:'smooth'}); }
  else if (sec === 'glossary') { setBsTab('glossary', document.querySelectorAll('.bs-tab')[3]); document.getElementById('bottomSection').scrollIntoView({behavior:'smooth'}); }
}
 
// ── INIT ──
window.addEventListener('load', () => {
  setTimeout(() => loadChart('NASDAQ:AAPL', 'D', '1'), 300);
  renderRpBody();
  renderBsBody();
});
</script>
